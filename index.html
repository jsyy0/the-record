<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>동아리 통합 관리 시스템</title>
    <style>
        /* 핸드폰에서 터치하기 편하도록 스크롤바 숨기기 및 최적화 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <nav class="sticky top-0 bg-white/80 backdrop-blur-md border-b z-50 px-5 py-4 flex justify-between items-center">
        <div class="font-black text-xl text-green-600">CLUB_ADMIN</div>
        <div class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold text-slate-500">USER: 19 MEMBERS</div>
    </nav>

    <header class="bg-[#a5cc6b] p-8 md:p-16">
        <div class="max-w-4xl mx-auto text-center md:text-left">
            <h1 class="text-5xl md:text-7xl font-black text-white leading-tight">내가 <br> <span class="text-black">니 앱이다</span></h1>
            <p class="mt-4 font-bold text-black/60 italic">"코딩으로 세상을 바꾸는 19명의 개발자들"</p>
            
            <div class="mt-10">
                <a href="https://your-notion-or-google-link.com" target="_blank" 
                   class="inline-block w-full md:w-auto bg-black text-white text-center px-8 py-5 rounded-2xl font-black text-lg shadow-xl hover:scale-105 transition-transform">
                   🗓️ 1학기 전체 일정표 확인하기
                </a>
            </div>
        </div>
    </header>

    <section class="max-w-4xl mx-auto -mt-8 px-4">
        <div class="bg-white rounded-[2rem] shadow-2xl p-6 border border-slate-100">
            <h2 class="text-xl font-black mb-4 flex items-center">
                📍 오늘의 출석 현황 <span class="ml-2 text-sm font-normal text-slate-400">(이름을 클릭하세요)</span>
            </h2>
            <div class="attendance-grid">
                <script>
                    const members = ["강민", "김건", "김율", "나현", "도윤", "민재", "박준", "서연", "승우", "아린", "예준", "우진", "윤서", "은우", "지민", "지후", "하윤", "현우", "혜원"];
                    document.write(members.map(name => `
                        <button onclick="this.classList.toggle('bg-green-500'); this.classList.toggle('text-white'); this.classList.toggle('border-transparent');" 
                                class="border border-slate-200 py-3 rounded-xl text-sm font-bold transition-all active:scale-90 shadow-sm">
                            ${name}
                        </button>
                    `).join(''));
                </script>
            </div>
            <button onclick="alert('데이터베이스 연결 시 서버로 전송됩니다!')" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-xl font-bold">출석 명단 저장하기</button>
        </div>
    </section>

    <section class="max-w-4xl mx-auto mt-16 px-4">
        <h2 class="text-2xl font-black mb-6">📂 차시별 포트폴리오</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="링크1" class="bg-white p-5 rounded-2xl border hover:border-green-500 transition group text-center">
                <div class="text-3xl mb-2">🔥</div>
                <div class="font-black text-sm">1차시</div>
                <div class="text-[10px] text-slate-400 group-hover:text-green-500">기획 및 설계</div>
            </a>
            <a href="링크2" class="bg-white p-5 rounded-2xl border hover:border-green-500 transition group text-center">
                <div class="text-3xl mb-2">💻</div>
                <div class="font-black text-sm">2차시</div>
                <div class="text-[10px] text-slate-400 group-hover:text-green-500">환경 세팅</div>
            </a>
            <a href="링크3" class="bg-white p-5 rounded-2xl border hover:border-green-500 transition group text-center">
                <div class="text-3xl mb-2">🎨</div>
                <div class="font-black text-sm">3차시</div>
                <div class="text-[10px] text-slate-400 group-hover:text-green-500">UI 개발</div>
            </a>
            <a href="링크4" class="bg-white p-5 rounded-2xl border hover:border-green-500 transition group text-center">
                <div class="text-3xl mb-2">🚀</div>
                <div class="font-black text-sm">4차시</div>
                <div class="text-[10px] text-slate-400 group-hover:text-green-500">베타 릴리즈</div>
            </a>
        </div>
    </section>

    <section class="max-w-4xl mx-auto my-16 px-4 pb-20">
        <h2 class="text-2xl font-black mb-6">📝 핵심 개념 정리</h2>
        <div class="space-y-3">
            <a href="개념링크1" class="flex justify-between items-center bg-slate-900 text-white p-5 rounded-2xl hover:bg-slate-800">
                <div>
                    <span class="text-green-400 text-xs font-bold uppercase tracking-widest">Today's Topic</span>
                    <h3 class="font-bold">React State와 Props 이해하기</h3>
                </div>
                <span class="text-xl">→</span>
            </a>
            <a href="개념링크2" class="flex justify-between items-center bg-white border p-5 rounded-2xl hover:border-slate-900">
                <div>
                    <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Previous</span>
                    <h3 class="font-bold">Tailwind CSS를 활용한 반응형 UI</h3>
                </div>
                <span class="text-xl text-slate-300">→</span>
            </a>
        </div>
    </section>

</body>
</html>
