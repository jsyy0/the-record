<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>The record 동아리 홈페이지</title>
    <style>
        .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <nav class="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 px-6 py-4 flex justify-between items-center">
        <div class="font-black text-2xl text-green-600 italic tracking-tighter">THE RECORD</div>
        <div id="active-count" class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-full font-bold text-slate-500 uppercase tracking-wider">연결 중...</div>
    </nav>

    <header class="bg-[#a5cc6b] py-16 px-8 md:px-20 relative overflow-hidden">
        <div class="max-w-5xl mx-auto relative z-10">
            <h1 class="text-6xl md:text-8xl font-black text-white leading-[1.1]">
                THE RECORD <br> <span class="text-black">동아리 홈페이지</span>
            </h1>
            <p class="mt-6 text-xl font-bold text-black/70 italic underline decoration-black/20"> 시대의 미디어를 기록하고 영화로 남기다</p>
            <div class="mt-12">
                <a href="https://drive.google.com/file/d/1ABpdDqreD-i6UfEQfGsWq9U7MYI8lzcp/view?usp=sharing" target="_blank"
                   class="inline-block bg-black text-white px-10 py-5 rounded-2xl font-black text-xl shadow-2xl hover:scale-105 transition-transform active:scale-95">
                    🗓️ 1학기 전체 일정표 확인 
                </a>
            </div>
        </div>
    </header>

    <section id="attendance" class="max-w-4xl mx-auto -mt-10 px-4 relative z-20">
        <div class="bg-white rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,0,0,0.1)] p-8 border border-slate-100">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-2xl font-black">📍 실시간 출석체크</h2>
                    <p class="text-slate-400 text-sm font-medium mt-1">이름을 클릭하면 실시간으로 모든 기기에 반영됩니다.</p>
                </div>
                <div class="text-right"><span id="current-date" class="text-green-600 font-black text-lg font-mono"></span></div>
            </div>
            <div class="attendance-grid" id="member-buttons"></div>
        </div>
    </section>

    <section class="max-w-5xl mx-auto mt-24 px-6">
        <h2 class="text-3xl font-black mb-10">📂 차시별 포트폴리오</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <a href="#" class="group bg-white p-8 rounded-[2rem] border border-slate-100 hover:border-green-400 transition-all text-center">
                <div class="text-4xl mb-4">🔥</div>
                <div class="font-black text-lg">1차시</div>
            </a>
            </div>
    </section>

    <script>
        // 🚨 중요: 여기에 본인의 구글 웹 앱 URL을 넣으세요!
        const SCRIPT_URL = "여기에_URL_붙여넣기";

        const members = ["신채원", "박길", "배준석", "김예림", "윤준서", "최현석", "서연지", "이승아", "김재윤", "강민경", "김나연", "석연진", "이가빈", "정예준", "전지윤", "한가은", "임지섭", "지한결", "조서영"];

        document.getElementById('current-date').innerText = new Date().toLocaleDateString();

        // 실시간 목록 불러오기
        async function fetchAttendance() {
            try {
                const response = await fetch(SCRIPT_URL);
                const attendedMembers = await response.json();
                renderButtons(attendedMembers);
                document.getElementById('active-count').innerText = `${attendedMembers.length} Members Checked`;
            } catch (error) {
                console.error("연결 실패", error);
                renderButtons([]);
                document.getElementById('active-count').innerText = "Offline";
            }
        }

        // 버튼 생성
        function renderButtons(attendedMembers) {
            const btnContainer = document.getElementById('member-buttons');
            btnContainer.innerHTML = members.map(name => {
                const isChecked = attendedMembers.includes(name);
                return `
                    <button id="btn-${name}" onclick="submitAttendance('${name}', this)" 
                            ${isChecked ? 'disabled' : ''}
                            class="${isChecked ? 'bg-green-500 text-white border-transparent' : 'bg-slate-50 border-slate-200 hover:bg-white hover:border-green-400'} py-4 rounded-2xl text-sm font-bold transition-all active:scale-95 shadow-sm">
                        ${isChecked ? '✅ ' + name : name}
                    </button>
                `;
            }).join('');
        }

        // 출석 데이터 전송
        async function submitAttendance(name, btn) {
            if(btn.disabled) return;
            
            const originalText = btn.innerText;
            btn.innerText = "처리중..";
            btn.disabled = true;

            try {
                // 데이터를 보낼 때 fetch 옵션을 더 정밀하게 설정
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ "name": name }),
                    headers: { 'Content-Type': 'text/plain' } // CORS 우회를 위해 text/plain 사용 가능
                });
                
                // 전송 후 1초 뒤에 목록 갱신
                setTimeout(fetchAttendance, 1000);
            } catch (error) {
                alert("체크 실패! 인터넷이나 URL 설정을 확인하세요.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 시작 시 실행 및 10초마다 갱신
        fetchAttendance();
        setInterval(fetchAttendance, 10000);
    </script>
</body>
</html>
